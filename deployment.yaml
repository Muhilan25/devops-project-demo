apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-deployment
  labels:
    app: web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: python
        image: 072583797351.dkr.ecr.ap-south-1.amazonaws.com/python:v27
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
        env:
            - name: ENV
              value: "dev"
